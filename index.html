<!DOCTYPE html>
<html>
<head>
<title>Dushyant's Classes</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

/* HEADER */
header {
    background: linear-gradient(45deg, #6a11cb, #ff0080);
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
}

header img {
    width: 50px;
    border-radius: 50%;
    margin-right: 10px;
}

header h1 {
    margin: 0;
    font-size: 22px;
}

/* NAVBAR */
nav {
    background: #111;
    text-align: center;
    padding: 12px;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #ff0080;
}

/* HERO SECTION */
.banner {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1588072432836-e10032774350') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.overlay {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 10px;
    color: white;
}

.overlay h2 {
    font-size: 30px;
    margin-bottom: 10px;
}

.overlay p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    background: linear-gradient(45deg, #ff0080, #6a11cb);
    color: white;
    padding: 12px 25px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: black;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
    <img src="logo.png">
    <h1>Dushyant's Classes</h1>
</header>

<!-- NAVBAR -->
<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="courses.html">Courses</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- HERO SECTION -->
<div class="banner">
    <div class="overlay">
        <h2>Welcome to Dushyant's Classes</h2>
        <p>Quality Education for Bright Future</p>
        <a href="contact.html" class="btn">Join Now</a>
    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 Dushyant's Classes | All Rights Reserved
</footer>

</body>
</html>
